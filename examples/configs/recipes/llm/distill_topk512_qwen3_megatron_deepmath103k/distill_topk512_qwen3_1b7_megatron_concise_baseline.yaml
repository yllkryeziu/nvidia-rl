distillation:
  num_prompts_per_step: 64
  num_generations_per_prompt: 4
  max_rollout_turns: 1
  max_num_steps: 150
  max_num_epochs: 1
  val_batch_size: 64
  val_period: 10
  val_at_start: true
  val_at_end: true
  max_val_samples: 256
  val_track_train_metrics: true
  topk_logits_k: 512
  seed: 42
  context_distillation:
    enabled: true
    mode: self_frozen
    problem_source: original_user_problem
    trace_source: dynamic
    teacher_prefix_template: |
      Solve the following math problem concisely
      and correctly. Be direct -- avoid unnecessary elaboration, redundant
      steps, or restating the problem. Focus only on the key reasoning steps
      needed to reach the answer.
      Put your final answer within \boxed{{}}.

      Problem:
      {problem}
    alignment: response_token_index
    overflow_policy: truncate_prefix_from_end  # keep the start of the teacher instruction visible if truncation is needed
    frozen_teacher_source: base_model
    trace_extractor:
      type: think_tag
      selection: first
      missing_trace_policy: empty
    metrics:
      enabled: true
  resource_isolation:
    enabled: true
    teacher_resident_on_gpu: true
    roles:
      training:
        num_nodes: 4  # TP=2, PP=2, DP=4
        gpus_per_node: 4
      generation:
        num_nodes: 2  # vLLM TP=1: 8 independent engines
        gpus_per_node: 4
      teacher:
        num_nodes: 1  # TP=2, PP=1, DP=2
        gpus_per_node: 4

loss_fn:
  kl_type: reverse
  mixed_kl_weight: 0.5
  zero_outside_topk: true

checkpointing:
  enabled: true
  checkpoint_dir: /p/scratch/envcomp/yll/checkpoints/distill-topk512-qwen3-1b7-p64-g4-megatron_concise_baseline-deepmath103k
  metric_name: val:accuracy
  higher_is_better: true
  keep_top_k: null
  save_period: 10
  checkpoint_must_save_by: null
  save_consolidated: false

policy:
  model_name: /p/project1/envcomp/yll/.cache/huggingface/hub/models--Qwen--Qwen3-1.7B/snapshots/70d244cc86ccca08cf5af4e1e306ecf908b1ad5e
  tokenizer:
    name: /p/project1/envcomp/yll/.cache/huggingface/hub/models--Qwen--Qwen3-1.7B/snapshots/70d244cc86ccca08cf5af4e1e306ecf908b1ad5e
    chat_template_kwargs:
      enable_thinking: true
  train_global_batch_size: 256  # step batch = 64 prompts * 4 gens = 256; grad_accum = 256 / (1 MBS * 4 DP) = 64
  train_micro_batch_size: 1
  generation_batch_size: 16  # 16 prompts across 8 vLLM engines => 2 prompts/engine; n=4
  logprob_batch_size: 1
  max_total_sequence_length: 20480
  precision: bfloat16
  logprob_chunk_size: null
  offload_optimizer_for_logprob: false
  dtensor_cfg:
    enabled: false
  dynamic_batching:
    enabled: false
    train_mb_tokens: 20480
    logprob_mb_tokens: 20480
    sequence_length_round: 64
  sequence_packing:
    enabled: false
    train_mb_tokens: 20480
    logprob_mb_tokens: 20480
    algorithm: modified_first_fit_decreasing
    sequence_length_round: 64
  max_grad_norm: 1.0
  make_sequence_length_divisible_by: 4  # TP(2) * CP(1) * 2
  megatron_cfg:
    enabled: true
    empty_unused_memory_level: 0
    activation_checkpointing: true
    converter_type: "Qwen3ForCausalLM"
    tensor_model_parallel_size: 2
    expert_tensor_parallel_size: 1
    expert_model_parallel_size: 1
    pipeline_model_parallel_size: 2  # 28 layers / 2 = 14 layers/stage
    num_layers_in_first_pipeline_stage: null
    num_layers_in_last_pipeline_stage: null
    context_parallel_size: 1
    pipeline_dtype: bfloat16
    sequence_parallel: true
    freeze_moe_router: true
    moe_router_dtype: "fp64"
    moe_router_load_balancing_type: "none"
    moe_router_bias_update_rate: 0.0
    moe_permute_fusion: false
    apply_rope_fusion: true
    bias_activation_fusion: true
    defer_fp32_logits: false
    moe_per_layer_logging: false
    moe_enable_deepep: false
    moe_token_dispatcher_type: "allgather"
    moe_shared_expert_overlap: false
    optimizer:
      optimizer: "adam"
      lr: 1.0e-5
      min_lr: 1.0e-5
      weight_decay: 0.01
      bf16: true
      fp16: false
      params_dtype: "float32"
      adam_beta1: 0.9
      adam_beta2: 0.999
      adam_eps: 1.0e-8
      sgd_momentum: 0.9
      use_distributed_optimizer: true
      use_precision_aware_optimizer: true
      optimizer_cpu_offload: false
      optimizer_offload_fraction: 0.0
      clip_grad: 1.0
    scheduler:
      start_weight_decay: 0.01
      end_weight_decay: 0.01
      weight_decay_incr_style: "constant"
      lr_decay_style: "constant"
      lr_decay_iters: 150
      lr_warmup_iters: 10
      lr_warmup_init: 1.0e-6
    distributed_data_parallel_config:
      grad_reduce_in_fp32: false
      overlap_grad_reduce: true
      overlap_param_gather: true
      use_custom_fsdp: false
      data_parallel_sharding_strategy: "optim_grads_params"
    fp8_cfg:
      enabled: false
      fp8: "e4m3"
      fp8_recipe: "blockwise"
      fp8_param: false
  optimizer:
    name: torch.optim.AdamW
    kwargs:
      lr: 1.0e-5
      weight_decay: 0.01
      betas: [0.9, 0.999]
      eps: 1.0e-8
      foreach: false
      fused: false
  scheduler:
    - name: torch.optim.lr_scheduler.LinearLR
      kwargs:
        start_factor: 0.1
        end_factor: 1.0
        total_iters: 10
    - name: torch.optim.lr_scheduler.ConstantLR
      kwargs:
        factor: 1.0
        total_iters: 10000000000
    - milestones: [10]
  generation:
    backend: vllm
    max_new_tokens: 16384
    temperature: 0.6
    top_p: 1.0
    top_k: null
    stop_token_ids: null
    stop_strings: null
    vllm_cfg:
      async_engine: false
      precision: bfloat16
      kv_cache_dtype: auto
      tensor_parallel_size: 1  # 8 independent engines across 2 nodes
      pipeline_parallel_size: 1
      expert_parallel_size: 1
      gpu_memory_utilization: 0.80
      max_model_len: 20480
      enforce_eager: false
      use_deep_gemm: false
      num_last_layers_in_bf16: 0
      num_first_layers_in_bf16: 0
      distributed_executor_backend: null
    colocated:
      enabled: false
      resources:
        gpus_per_node: 4
        num_nodes: 2

